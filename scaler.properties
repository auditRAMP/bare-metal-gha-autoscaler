# scaler.properties
# -----------------
# This file is HOT-RELOADABLE! Changes saved here will be applied by the daemon
# immediately on its next polling tick without requiring you to restart the system.

# The maximum number of concurrent bare-metal runners allowed to execute simultaneously
MAX_RUNNERS=5

# The minimum number of purely "Idle" runners the autoscaler should always maintain
# warm and waiting for GitHub jobs.
MIN_IDLE=1

# The interval in seconds the daemon waits between pinging the GitHub REST API.
# Note: GitHub grants 5000 API requests per hour. 
# 15 seconds = 240 requests/hour (~4.8% of typical quota).
POLL_INTERVAL=15
